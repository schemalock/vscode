name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Lint · type-check · bundle · unit tests
    runs-on: [self-hosted, Linux, X64]
    container:
      image: node:20

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run compile

      - name: Bundle
        run: npm run bundle

      - name: Unit tests
        run: npm run test:unit

  integration:
    name: Integration tests (xvfb)
    # Secrets are unavailable on fork PRs — integration tests run on push to
    # master and manual dispatch only.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, Linux, X64]
    container:
      image: ghcr.io/schemalock/ci-base:latest
      options: --user root

    steps:
      - uses: actions/checkout@v4

      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ vars.SCHEMALOCK_APP_ID }}
          private-key: ${{ secrets.SCHEMALOCK_APP_PRIVATE_KEY }}
          repositories: app

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Download schemalock binary (pinned tag)
        run: |
          APP_TAG=$(cat .app-version | tr -d '[:space:]')
          mkdir -p bin/linux-x64
          gh release download "$APP_TAG" \
            --repo schemalock/app \
            --pattern "schemalock-linux-x64" \
            --output bin/linux-x64/schemalock
          chmod +x bin/linux-x64/schemalock
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Bundle
        run: npm run bundle

      - name: Integration tests
        run: xvfb-run -a npm test
