name: build-ci-image

on:
  push:
    branches: [master]
    paths:
      - ".github/ci-image/**"
      - ".github/workflows/build-ci-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, Linux, X64]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io -u ${{ github.repository_owner }} --password-stdin

      - name: Build and push
        run: |
          podman build \
            -t ghcr.io/${{ github.repository_owner }}/ci-base:latest \
            -t ghcr.io/${{ github.repository_owner }}/ci-base:${{ github.sha }} \
            .github/ci-image
          podman push ghcr.io/${{ github.repository_owner }}/ci-base:latest
          podman push ghcr.io/${{ github.repository_owner }}/ci-base:${{ github.sha }}
