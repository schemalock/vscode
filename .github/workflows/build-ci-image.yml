name: build-ci-image

on:
  push:
    branches: [master]
    paths:
      - ".github/ci-image/**"
      - ".github/workflows/build-ci-image.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .github/ci-image
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/ci-base:latest
            ghcr.io/${{ github.repository_owner }}/ci-base:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
